# RiskIntel Cloud API - CI: test, Docker image
# See docs/devops/01-ci-cd-pipeline.md

name: Cloud CI

on:
  push:
    branches: [main]
    paths:
      - 'cloud/**'
      - '.github/workflows/cloud.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cloud/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod download
      - run: go build -o /dev/null ./cmd/api

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./cloud/api
          file: ./cloud/api/Dockerfile
          push: false
          tags: riskintel-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
