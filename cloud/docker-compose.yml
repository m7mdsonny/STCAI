# RiskIntel Cloud - Local development
# Multi-tenant SaaS: API, Auth, Tenant, License, Event, Notify, Telemetry
# See docs/architecture/02-cloud-saas-architecture.md

version: "3.9"

services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://riskintel:riskintel@db:5432/riskintel
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - SMS_PROVIDER_URL=${SMS_PROVIDER_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: riskintel
      POSTGRES_PASSWORD: riskintel
      POSTGRES_DB: riskintel
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
